<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Viral</title>

<!-- POPUNDER -->
<script>

    s.dataset.zone='10879872',
    s.src='https://al5sm.com/tag.min.js'

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* HEADER */
.header {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    align-items: center;
    z-index: 10;
}

.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: url('https://i.pravatar.cc/100') center/cover;
    margin-right: 10px;
}

.follow {
    background: #ff2e63;
    padding: 5px 10px;
    border-radius: 20px;
    margin-left: 10px;
    font-size: 12px;
}

/* VIDEO */
.video-container {
    position: relative;
    width: 100%;
    height: 70vh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* PLAY */
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.play-btn::after {
    content: '▶';
    font-size: 30px;
    color: black;
}

/* TELEGRAM */
.telegram {
    position: fixed;
    right: 15px;
    bottom: 90px;
    width: 60px;
    height: 60px;
    background: #0088cc;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,136,204,0.7);
}

.telegram img {
    width: 30px;
    filter: brightness(0) invert(1);
}

/* LIVE COMMENTS */
.live-comments {
    position: fixed;
    bottom: 20px;
    left: 10px;
    width: 70%;
    z-index: 20;
    pointer-events: none;
}

.live-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    animation: fadeUp 4s ease forwards;
}

.live-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    margin-right: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
    font-weight: bold;
}

.live-text {
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
    border-radius: 15px;
    font-size: 13px;
}

@keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10px); }
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="avatar"></div>
    <div>
        <div><b>Dinda Utami</b></div>
        <div style="font-size:12px;">155K Pengikut</div>
    </div>
    <div class="follow">Ikuti</div>
</div>

<!-- VIDEO -->
<div class="video-container" onclick="triggerAds()">
    <video id="vid">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="play-btn" onclick="playVideo(event)"></div>
</div>

<!-- TELEGRAM REAL LOGO -->
<div class="telegram" onclick="goTelegram()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
</div>

<!-- LIVE COMMENTS -->
<div class="live-comments" id="liveComments"></div>

<script>
let vid = document.getElementById("vid");
let click = 0;
let lastClick = 0;

/* PLAY */
function playVideo(e){
    e.stopPropagation();
    vid.play();
    document.querySelector('.play-btn').style.display = 'none';
    triggerAds();
}

/* IKLAN HIGH CPM */
function triggerAds(){
    let now = Date.now();
    if(now - lastClick < 800) return;
    lastClick = now;

    click++;

    if(click === 1){
        // popunder auto
    }

    else if(click === 2){
        setTimeout(() => {
            window.open("https://omg10.com/4/10888070", "_blank");
        }, 1500);
    }

    else if(click === 3){
        setTimeout(() => {
            window.open("https://omg10.com/4/10888070", "_blank");
        }, 1200);
    }
}

/* TELEGRAM */
function goTelegram(){
    triggerAds();
    setTimeout(() => {
        window.open("https://t.me/viralterkini", "_blank");
    }, 1000);
}

/* LIVE COMMENTS */
const comments = [
    "Nomor wa aku 0821xxxx",
    "spill dong kak 😍",
    "rame banget ini live",
    "link telegram mana?",
    "kok bisa sih 😳",
    "aku mau juga",
    "serius ini?",
    "gila viral banget 🔥",
    "join tele nya kak",
    "lagi nonton juga nih"
];

function randomColor(){
    const colors = ["#ff5c5c","#ffc107","#00c9a7","#4dabf7","#b197fc"];
    return colors[Math.floor(Math.random()*colors.length)];
}

function addLiveComment(){
    let container = document.getElementById("liveComments");

    let item = document.createElement("div");
    item.className = "live-item";

    let circle = document.createElement("div");
    circle.className = "live-circle";
    circle.style.background = randomColor();
    circle.innerText = String.fromCharCode(65 + Math.floor(Math.random()*26));

    let text = document.createElement("div");
    text.className = "live-text";
    text.innerText = comments[Math.floor(Math.random()*comments.length)];

    item.appendChild(circle);
    item.appendChild(text);
    container.appendChild(item);

    setTimeout(() => {
        item.remove();
    }, 4000);
}

setInterval(() => {
    addLiveComment();
}, 1200 + Math.random()*1500);
</script>

</body>
</html>
