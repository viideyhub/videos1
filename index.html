<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video</title>

<style>
body{margin:0;background:#000;font-family:Arial;color:#fff;}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:12px;
background:#111;
}

/* CONTAINER */
.container{max-width:720px;margin:auto;}

/* VIDEO */
.video-box{position:relative;}
video{width:100%;display:block;}

/* PLAY */
.overlay{
position:absolute;
top:0;left:0;right:0;bottom:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.3);
}
.play{
background:#fff;
color:#000;
width:70px;height:70px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

/* CTA */
.cta{
text-align:center;
margin:15px;
}
.cta button{
padding:12px 20px;
background:#ff2d55;
color:#fff;
border:none;
border-radius:10px;
font-size:15px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(5px);
z-index:9999;
justify-content:center;
align-items:center;
}

.box{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
width:90%;
max-width:320px;
text-align:center;
}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
width:100%;
font-weight:bold;
}
.yes{background:#ff2d55;color:#fff;}
.no{background:#ddd;}
</style>
</head>

<body>

<div class="header">
<div>videy.co</div>
<div>Upload</div>
</div>

<div class="container">

<div class="video-box">
<video id="vid" playsinline>
<source src="https://cdn.videy.co/Fmm16v9f1.mp4">
</video>

<div class="overlay" onclick="handleClick()">
<div class="play">▶</div>
</div>
</div>

<div class="cta">
<button onclick="goLink()">Lanjut Nonton</button>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="box">
<h3>Konfirmasi Usia</h3>
<p>Konten ini hanya untuk 18+</p>

<button class="btn yes" onclick="goLink()">Saya 18+</button>
<button class="btn no" onclick="closePopup()">Batal</button>
</div>
</div>

<script>
let click = 0;
let shown = false;

/* DIRECT LINK */
function goLink(){
window.location.href="https://omg10.com/4/10874904";
}

/* CLICK FLOW */
function handleClick(){
let v = document.getElementById("vid");
click++;

if(click === 1){
v.play();
document.querySelector(".overlay").style.display="none";

/* popup muncul setelah 5 detik */
if(!shown){
shown = true;
setTimeout(()=>{
v.pause();
document.getElementById("popup").style.display="flex";
},5000);
}

} else {
goLink(); // klik ke-2 = cuan
}
}

/* CLOSE POPUP */
function closePopup(){
document.getElementById("popup").style.display="none";
document.getElementById("vid").play();
}

/* AUTO NEXT (ganti sesuai halaman) */
document.getElementById("vid").addEventListener("ended",()=>{
window.location.href="video2.html";
});
</script>

</body>
  </html>
